<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      color: #00d4aa;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
    }
    #status {
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 12px;
      display: none;
    }
    #status.error { display: block; background: #3d1f1f; color: #ff6b6b; }
    #status.success { display: block; background: #1f3d2a; color: #6bff8e; }
    #program-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #program-info {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 12px;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
    .btn-json { background: #4a9eff; color: #fff; }
    .btn-txt { background: #ff9f43; color: #fff; }
    .btn-md { background: #a66bff; color: #fff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #preview {
      margin-top: 12px;
      padding: 8px;
      background: #0f0f23;
      border-radius: 6px;
      font-size: 11px;
      color: #ccc;
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }
    .scope-count {
      display: inline-block;
      background: #2a2a4a;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      color: #00d4aa;
    }
  </style>
</head>
<body>
  <h1>YWH Program Extractor</h1>
  <p class="subtitle">Extract program description from active page</p>
  <div id="status"></div>
  <div id="program-title"></div>
  <div id="program-info"></div>
  <div class="btn-group">
    <button class="btn-json" id="btn-json" disabled>JSON</button>
    <button class="btn-txt" id="btn-txt" disabled>TXT</button>
    <button class="btn-md" id="btn-md" disabled>MD</button>
  </div>
  <div id="preview"></div>
  <script src="popup.js"></script>
</body>
</html>
